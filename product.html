<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>Product — AUTOVB.WRX</title>
<meta name="description" content="Configure your AURACORE part and add it to your order.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=10">
</head>
<body>

<main id="ppMain"></main>

<script src="app.js?v=10"></script>
<script>
mountChrome("shop.html");

const params = new URLSearchParams(location.search);
const p = productBySlug(params.get("p"));

if(!p){
  $("ppMain").innerHTML = `
    <div class="pp">
      <div class="crumb"><a href="index.html">Home</a></div>
      <h1 style="font-size:28px;font-weight:800">Product not found</h1>
      <p style="color:var(--gray);margin-top:10px">That product doesn't exist. <a href="shop.html" style="color:var(--wrb)">Back to the catalog →</a></p>
    </div>`;
} else {
  document.title = p.name + " — AUTOVB.WRX";
  let sel = {};
  (p.options||[]).forEach(o => sel[o.label] = choiceName(optionChoiceList(o)[0]));
  let qty = 1;
  let mainOverride = null;   // set when a gallery thumb is clicked; cleared on option change

  const sectionLabel = {lineup:"Reflectors", interior:"Interior & Lighting", system:"The System"}[p.section] || "Products";
  const sectionHref  = {lineup:"shop.html", interior:"shop.html", system:"system.html"}[p.section] || "shop.html";

  function currentMainSrc(){
    if(mainOverride) return mainOverride;
    if(p.photoKey && p.photos){
      const key = p.photoKey.map(l=>sel[l]).join("|");
      return p.photos[key] || "";
    }
    return p.img || "";
  }
  function shownLabel(){
    if(p.photoKey) return p.photoKey.map(l=>sel[l]).join(" · ");
    return "";
  }

  function optBtn(o, c){
    const name = choiceName(c);
    const priceTag = (typeof c==="object" && c.price!=null) ? `<small>${fmt(c.price)}</small>` : "";
    return `<button class="optbtn ${sel[o.label]===name?'sel':''}" data-group="${o.label}" data-choice="${name}">${name}${priceTag}</button>`;
  }
  function optionsHTML(){
    return (p.options||[]).map(o=>{
      const rows = o.sections
        ? o.sections.map(s=>`<span class="optsub">${s.title}</span><div class="optrow">${s.choices.map(c=>optBtn(o,c)).join("")}</div>`).join("")
        : `<div class="optrow">${o.choices.map(c=>optBtn(o,c)).join("")}</div>`;
      return `<div class="optgroup"><span class="optlabel">${o.label}</span>${rows}</div>`;
    }).join("");
  }
  function noticesHTML(){
    return (p.requires ? `<div class="noticebox"><b>Heads up</b>${p.requires}</div>` : "") +
           (p.delayed ? `<div class="noticebox warn"><b>Backordered</b>${p.delayed}</div>` : "") +
           (p.promo ? `<div class="noticebox promo"><b>Photo bounty — $5 off</b>${p.promo}</div>` : "");
  }
  function photoHTML(){
    const src = currentMainSrc();
    const cap = shownLabel();
    const thumbs = (p.gallery && p.gallery.length)
      ? `<div class="pp-thumbs">${p.gallery.map((g,i)=>`<button class="pp-thumb" data-src="${g}"><img src="${g}" alt="${p.name} photo ${i+1}"></button>`).join("")}</div>`
      : "";
    return `
      <div class="pp-photo">
        ${src ? `<img id="ppMainImg" src="${src}" alt="${p.name}${cap?' — '+cap:''}">` : `<span class="ph">Photo coming soon</span>`}
      </div>
      ${cap ? `<div class="pp-caption">Shown: ${cap}</div>` : ``}
      ${thumbs}`;
  }
  function metaHTML(){
    const rows = [];
    rows.push(["SKU", selectedSku(p, sel)]);
    rows.push(["Fits", p.fits]);
    if(p.unit) rows.push(["Sold as", "1 " + p.unit]);
    if(p.delayed) rows.push(["Availability", "Backordered ~4 weeks"]);
    else rows.push(["Availability", "Made to order"]);
    return `<dl class="pp-meta">${rows.map(([k,v])=>`<div><dt>${k}</dt><dd>${v}</dd></div>`).join("")}</dl>`;
  }
  function extraSectionsHTML(){
    let html = "";
    if(p.details){
      html += `<section class="pp-section"><h2>Details</h2><div class="pp-longtext">${p.details}</div></section>`;
    }
    if(p.gallery && p.gallery.length){
      html += `<section class="pp-section"><h2>Gallery</h2><div class="pp-gallery">${p.gallery.map((g,i)=>`<img src="${g}" alt="${p.name} gallery ${i+1}" loading="lazy">`).join("")}</div></section>`;
    }
    if(p.video){
      html += `<section class="pp-section"><h2>Install Video</h2><div class="pp-video"><iframe src="${p.video}" title="${p.name} install video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div></section>`;
    }
    if(p.reviews && p.reviews.length){
      html += `<section class="pp-section"><h2>Reviews</h2><div class="reviews">${p.reviews.map(r=>`
        <div class="review">
          <div class="review-top"><span class="who">${r.who}</span><span class="stars">${"★".repeat(r.stars)}${"☆".repeat(Math.max(0,5-r.stars))}</span></div>
          <div class="body">${r.body}</div>
        </div>`).join("")}</div></section>`;
    }
    return html;
  }

  function render(){
    $("ppMain").innerHTML = `
      <div class="pp">
        <div class="crumb"><a href="index.html">Home</a><span>/</span><a href="${sectionHref}">${sectionLabel}</a><span>/</span>${p.name}</div>
        <div class="pp-grid">
          <div class="pp-media">${photoHTML()}</div>
          <div class="pp-info">
            <span class="fits">${p.fits}</span>
            <h1>${p.name}</h1>
            <span class="pp-sku" id="ppSku">${selectedSku(p, sel)}</span>
            <div class="pp-price" id="ppPrice"></div>
            <p class="pp-desc">${p.desc}</p>
            ${noticesHTML()}
            <div id="ppOptions">${optionsHTML()}</div>
            <div class="optgroup"><span class="optlabel">Quantity</span>
              <div class="qtyrow"><div class="qtybox">
                <button id="qtyMinus" aria-label="Decrease quantity">−</button>
                <span id="qtyVal">${qty}</span>
                <button id="qtyPlus" aria-label="Increase quantity">+</button>
              </div></div>
            </div>
            <div class="pp-addrow">
              <button class="pp-add" id="ppAdd">Add to order</button>
            </div>
            ${metaHTML()}
          </div>
        </div>
        ${extraSectionsHTML()}
      </div>`;
    refreshPrice();
    bindControls();
  }
  function refreshPrice(){
    $("ppPrice").innerHTML = `${fmt(selectedPrice(p, sel) * qty)}${p.unit ? ` <span class="unit">/ ${p.unit}</span>` : ``}`;
    if($("ppSku")) $("ppSku").textContent = selectedSku(p, sel);
  }
  function bindControls(){
    document.querySelectorAll("#ppOptions .optbtn").forEach(b=>{
      b.onclick = ()=>{
        sel[b.dataset.group] = b.dataset.choice;
        if(b.dataset.group === "LED Type" && "Lens Type" in sel && b.dataset.choice !== "No LED"){
          sel["Lens Type"] = "Frosted";
        }
        mainOverride = null;
        render();
      };
    });
    document.querySelectorAll(".pp-thumb").forEach(t=>{
      t.onclick = ()=>{ mainOverride = t.dataset.src; const img=$("ppMainImg"); if(img) img.src = mainOverride; };
    });
    $("qtyPlus").onclick = ()=>{ qty=Math.min(20,qty+1); $("qtyVal").textContent=qty; refreshPrice(); };
    $("qtyMinus").onclick = ()=>{ qty=Math.max(1,qty-1); $("qtyVal").textContent=qty; refreshPrice(); };
    $("ppAdd").onclick = ()=>{
      addToCart({ sku:selectedSku(p, sel), name:p.name, price:selectedPrice(p, sel), qty, options:{...sel} });
      if(window.matchMedia("(max-width:640px)").matches){ showToast("Added to your order"); }
      else { openDrawer(); }
    };
  }

  render();
}
</script>
</body>
</html>
